function buildLearnMap(learnings){
  var m={};
  (learnings||[]).forEach(function(l){ if(!m[l.employee_id]) m[l.employee_id]={slot:{},day:{}};
    if(l.kind==='avoid_slot'||l.kind==='prefer_slot'){ if(l.slot) m[l.employee_id].slot[l.slot]=(m[l.employee_id].slot[l.slot]||0)+l.delta; }
    else if(l.kind==='avoid_day'||l.kind==='prefer_day'){ if(l.day!=null) m[l.employee_id].day[l.day]=(m[l.employee_id].day[l.day]||0)+l.delta; }
  });
  return m;
}
function cloneDay(dd){ dd=dd||{};
  var o={}; SLOTS.forEach(function(s){ o[s]=[]; });
  SLOTS.forEach(function(s){ (dd[s]||[]).forEach(function(a){ var c={id:a.id,pos:a.pos,via:a.via,homeBranch:a.homeBranch,locked:!!a.locked};
    if(a.t) c.t=a.t;   // เวลาจริงที่หน้างานกำหนด (ต่างจากกะมาตรฐาน) — ต้องไม่หายตอน clone/save
    if(a.ext) c.ext=true;   // กะยาว OT (บรีสโมเดล)
    o[s].push(c); }); });
  return o; }

function solveAll(state, opts){
  opts=opts||{};
  // วันเริ่มงาน: ต้องรู้วันที่จริงของแต่ละช่องในสัปดาห์ เพื่อไม่จัดคนก่อนวันเริ่มงาน (ปูนาเริ่ม 8 → จ/อ ไม่จัด)
  if(!state.weekDates){ try{ state=Object.assign({},state,{weekDates:weekDates().map(isoDate)}); }catch(e){} }
  // best-of-8: ลอง 8 seed เลือกผลที่ขาดน้อยสุดอัตโนมัติ (deterministic จาก seed หลัก) — ลำดับเลือกคนต่างกันทำให้วันท้ายๆ รอดต่างกัน
  if(!opts._single){
    var best=null, bestCost=Infinity;

      var st2=Object.assign({},state,{seed:(state.seed||1)+t*101});
      var r=solveAll(st2, Object.assign({},opts,{_single:true}));
      var cost=(r._underTarget||0)*8 + (r._paidLoans||0)*0.5;   // ครบมาก่อน แล้วค่อยประหยัดเที่ยวรถ
      Object.keys(r).forEach(function(bid){ if(bid.charAt(0)==='_') return;
        cost += r[bid].coverShort.length*10 + r[bid].peakShort.length*3 + r[bid].unscheduled.length*30; });
      if(cost<bestCost){ bestCost=cost; best=r; }
      if(cost===0) break; }
    return best;
  }
  var storedGrid=opts.storedGrid||{};
  var regen=opts.regenDays||[0,1,2,3,4,5,6];
  var regenSet={}; regen.forEach(function(d){ regenSet[d]=1; });
  var POS=['cook','kasst','cash'];
  var seed=state.seed||1;
  var branches=state.branches;
  var brName={}, brPlan={}; branches.forEach(function(b){ brName[b.id]=b.short||b.name; brPlan[b.id]=b.plan||{}; });
  var learnMap=buildLearnMap(state.learnings);
  var E=state.employees.map(function(e){
    var ps={}; (e.preferredSlots||[]).forEach(function(s){ ps[s]=1; });
    var none=!(ps.morning||ps.mid||ps.late);
    var home = e.preferredSlots&&e.preferredSlots[0] ? (SLOT_DB2ENG[e.preferredSlots[0]]||'morning') : 'morning';
    return { id:e.id, name:e.name, branchId:e.branchId,
      positions:(e.positions&&e.positions.length)?e.positions:[],
      aM:none||!!ps.morning, aMid:none||!!ps.mid, aL:none||!!ps.late, home:home,
      off:e.off||[], loanOk:!!e.loanOk, cg:e.commuteGroup||null, canOt:!!e.canOt, canSplit:!!e.canSplit, hiredAt:e.hiredAt||null }; });
  var Emap={}; E.forEach(function(e){ Emap[e.id]=e; });
  var wkDates=state.weekDates||null;   // ['2026-07-06',...] อิงสัปดาห์ที่กำลังจัด
  var hiredBlock=function(e,d){ return !!(e.hiredAt && wkDates && wkDates[d] && wkDates[d] < e.hiredAt); }; // วันนั้นก่อนวันเริ่มงาน = ยังไม่จัด
  var availDays=function(e){ var n=0; for(var d=0;d<7;d++){ if(!hiredBlock(e,d)) n++; } return n; };  // จำนวนวันที่จัดได้จริง (หักวันก่อนเริ่มงาน)
  var weeks={}; branches.forEach(function(b){ weeks[b.id]={}; for(var d=0;d<7;d++){ weeks[b.id][d]={}; SLOTS.forEach(function(sl){ weeks[b.id][d][sl]=[]; }); } });
  var gSlots={}, gDays={}, gHours={}, gLoan={}, gTrip={};   // gTrip: ทริปยืม from|to|วัน → กะ (รวมรถ)
  var slotsOfDay=function(id,d){ return gSlots[id+'|'+d]||[]; };
  var workDays=function(id){ return Object.keys(gDays[id]||{}).length; };
  // H4 ข้ามสัปดาห์: d=0 (จันทร์) ดูดึกอาทิตย์ของสัปดาห์ก่อนจาก state (prevWeekSunNight) · ข้อยกเว้นหน้างานจริงที่มี a.t เริ่ม≥10:00 = กะที่ pre-place ไว้ ไม่ผ่าน eligible อยู่แล้ว จึงไม่ถูกบล็อก
  var prevWk=state.prevWeekSunNight||{};
  var prevNight=function(id,d){ return d>0 ? slotsOfDay(id,d-1).indexOf('night')>=0 : !!prevWk[id]; };
  var cellPos=function(bid,d,slot,pos){ return weeks[bid][d][slot].filter(function(a){return a.pos===pos;}).length; };

        } } } })(d); } } };
  polish();
  // กฎซัน: พนักงานประจำทุกคนทำงาน 6 วัน/สัปดาห์ — คนที่ยังไม่ครบ เติมเป็นกำลังเสริมสาขาตัวเอง เริ่มจากวันขายดี
  // รอบแรกเว้นวันหยุดที่ขอ · รอบสองถ้ายังไม่ครบค่อยทับ (หน้างานมาก่อน)
  var fillTo6=function(skipPrefOff){
    [0,1,6,2,5,3,4].forEach(function(d){ if(!regenSet[d]) return;
      E.forEach(function(e){
        if(workDays(e.id)>=targetOf(e)) return;
        if(hiredBlock(e,d)) return;                     // ก่อนวันเริ่มงาน — ไม่เติม
        if(skipPrefOff && e.off.indexOf(d)>=0) return;
        if(slotsOfDay(e.id,d).length) return;
        if((gHours[e.id]||0)+10 > (e.canOt?72:60)) return;
        // เลือกกะที่ "คนบางสุด" ก่อน (เกลี่ยกำลังตามช่วงเวลา ไม่กองรวมกะเดียว) — เสมอกันค่อยตามที่ถนัด
        var prefOrder = e.home==='night' ? ['night','morning','mid'] : e.home==='mid' ? ['mid','morning','night'] : ['morning','mid','night'];
        var ok=prefOrder.filter(function(slot){
          if(!slotAvail(e,slot)) return false;
          if((slot==='morning'||slot==='mid')&&prevNight(e.id,d)) return false;
          if(slot==='night'){ var nx=slotsOfDay(e.id,d+1);
            if(nx.indexOf('morning')>=0||nx.indexOf('mid')>=0||nx.indexOf('lunch')>=0) return false; }
          return true; });
        if(!ok.length) return;
        ok.sort(function(a2,b2){ var ca=weeks[e.branchId][d][a2].length, cb=weeks[e.branchId][d][b2].length;
          return ca-cb || prefOrder.indexOf(a2)-prefOrder.indexOf(b2); });
        doAssign(e.branchId,d,ok[0],e,(e.positions[0]||'cook'),'home'); }); }); };
  fillTo6(true); fillTo6(false);
  // นับคนที่ยังไม่ถึงเป้าวัน (ใช้เลือก seed ที่จัดครบกว่า)
  var underTarget=0; E.forEach(function(e){ var free=0; for(var d=0;d<7;d++){ if(regenSet[d]&&!slotsOfDay(e.id,d).length&&!hiredBlock(e,d)) free++; }
    if(mustFull[e.id]&&free>0) underTarget+=free;
    else if(!mustFull[e.id]&&workDays(e.id)<targetOf(e)) underTarget+=(targetOf(e)-workDays(e.id)); });

  // ใครถูกจัดบ้าง (ข้ามสาขา) — ใช้เช็ค "จัดครบทุกคนไหม"
  var scheduled={}; branches.forEach(function(b){ for(var d=0;d<7;d++) SLOTS.forEach(function(sl){ weeks[b.id][d][sl].forEach(function(a){ scheduled[a.id]=1; }); }); });

  // reports ต่อสาขา
  var result={};
  branches.forEach(function(b){ var bid=b.id; var week=weeks[bid];
    var bEmps=E.filter(function(e){return e.branchId===bid;});
    var shortDays=[]; var coverShort=[]; var peakShort=[];
    for(var d=0;d<7;d++){ (function(d){
      var dm=demandOf(brPlan[bid],d);   // แผนรายวัน — เช้า/ดึกต่างกันได้ต่อวัน
      ['morning','night'].forEach(function(slot){ POS.forEach(function(pos){
        var need=dm[slot][pos]||0; var got=cellPos(bid,d,slot,pos); if(got<need) coverShort.push({d:d,slot:slot,pos:pos,short:need-got}); }); });
      var needMid=dm.mid.cook||0; var gotMid=midCovered(bid,d);
      if(gotMid<needMid) peakShort.push({d:d,slot:'mid',pos:'cook',short:needMid-gotMid});
    })(d); }
    coverShort.forEach(function(c){ if(shortDays.indexOf(c.d)<0) shortDays.push(c.d); });
    var seen={}; var suggestions=[];
    coverShort.forEach(function(c){ E.forEach(function(e){
      if(e.branchId===bid) return; if(e.loanOk) return;
      if(brName[bid]==='พญาไท') return; if(brName[e.branchId]!=='พญาไท' && !e.cg) return;   // แนะนำเฉพาะทิศทางที่กฎอนุญาต
      if(e.positions.indexOf(c.pos)<0) return; if(e.off.indexOf(c.d)>=0) return; if(slotsOfDay(e.id,c.d).length) return;
      var key=e.id+'|'+c.d; if(seen[key]) return; seen[key]=1;
      suggestions.push({empId:e.id,name:e.name,from:brName[e.branchId],d:c.d,slot:c.slot,pos:c.pos}); }); });
    // loaners จากตารางจริง (รวมที่ pre-place จาก grid ที่เก็บไว้ — ไม่ใช่แค่ pass ยืมรอบนี้)
    var loanersReal=[]; for(var dl=0;dl<7;dl++){ (function(d){ SLOTS.forEach(function(sl){ week[d][sl].forEach(function(a){
      if(a.via==='loan'){ var he=Emap[a.id]; loanersReal.push({name:he?he.name:'?', fromId:a.homeBranch, from:brName[a.homeBranch]||'', d:d, slot:sl, pos:a.pos}); } }); }); })(dl); }
    var noRest=bEmps.filter(function(e){return workDays(e.id)>=7 && !e.canOt;}).map(function(e){return e.name;});
    var unscheduled=bEmps.filter(function(e){return !scheduled[e.id];}).map(function(e){return {id:e.id,name:e.name}; });
    var fair=bEmps.map(function(e){ var days=workDays(e.id), hours=gHours[e.id]||0; return {id:e.id,name:e.name,days:days,hours:hours,target:targetOf(e),avail:availDays(e)}; });
    // วันหยุดจริง = วันที่ไม่ได้เข้ากะ (ระบบเลือกให้ตามหน้างาน) + จดว่าใครไม่ตรงวันที่ขอ
    var offByDay={}; var offMoved=[];
    for(var d3=0;d3<7;d3++){ (function(d){ offByDay[d]=bEmps.filter(function(e){return !slotsOfDay(e.id,d).length;}).map(function(e){return e.name;}); })(d3); }
    bEmps.forEach(function(e){ if(!e.off.length) return;
      var actual=[]; for(var d4=0;d4<7;d4++){ if(!slotsOfDay(e.id,d4).length) actual.push(d4); }
      if(actual.length===1 && e.off.indexOf(actual[0])<0) offMoved.push({name:e.name, want:e.off[0], got:actual[0]}); });
    result[bid]={ week:week, coverShort:coverShort, peakShort:peakShort, shortDays:shortDays, noRest:noRest,
      unscheduled:unscheduled, fair:fair, loaners:loanersReal, suggestions:suggestions, offByDay:offByDay, offMoved:offMoved };
  });
  result._underTarget=underTarget;
  // นับยืมที่ "มีค่ารถจริง" (ไม่นับบาส/จ๋าไปสาทร — บ้านอยู่นั่น) — ใช้เลือก seed ที่ประหยัดสุดในบรรดาที่จัดครบเท่ากัน
  var paid=0; branches.forEach(function(b){ for(var d=0;d<7;d++) SLOTS.forEach(function(sl){ weeks[b.id][d][sl].forEach(function(a){
    if(a.via==='loan'){ var e=Emap[a.id]; if(!(e&&e.cg&&brName[b.id]==='สาทร')) paid++; } }); }); });
  result._paidLoans=paid;
  return result;
}

function storedDaysSet(){ var s={}; Object.keys(S.grid||{}).forEach(function(bid){ var bd=S.grid[bid]||{}; Object.keys(bd).forEach(function(d){ var dd=bd[d]; if(SLOTS.some(function(sl){return dd[sl]&&dd[sl].length;})) s[+d]=1; }); }); return s; }

  // memo: solve ใหม่เฉพาะเมื่อ state ที่มีผลเปลี่ยน (best-of-8 seeds ~200ms — ไม่ควรรันทุก render)
  var key=JSON.stringify([S.seed,S.weekOffset,S.grid,S.branches.map(function(b){return b.plan;}),S.employees,S.learnings.length,S.prevWeekSunNight]);
  if(_solMemo.key===key) return _solMemo.val;

  var sol=solveAll(S,{storedGrid:S.grid||{},regenDays:days});

  var sol2=solveAll(S,{storedGrid:locks,regenDays:days});
  days.forEach(function(d){ S.branches.forEach(function(b){ S.grid[b.id]=S.grid[b.id]||{}; S.grid[b.id][d]=cloneDay(sol2[b.id].week[d]); }); });

    h+='<input id="pin-input" type="password" inputmode="numeric" placeholder="รหัสเจ้าของ" onkeydown="if(event.key===\'Enter\')submitPin()" style="width:100%;margin-top:14px;border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;font-family:\'Anuphan\',sans-serif;font-size:18px;letter-spacing:4px;text-align:center;color:#1A1A2E;">';

      '<button onclick="goSetup()" style="margin-top:16px;border:none;border-radius:13px;background:#FF7E1D;color:#1A1A2E;font-weight:700;font-size:13.5px;padding:12px 20px;cursor:pointer;">ไปตั้งค่า →</button></div>';

function renderDay(bid,branch,dates,todayIdx,sd,sol){
  var daySol=sol.week[sd]||{}; SLOTS.forEach(function(s){ if(!daySol[s]) daySol[s]=[]; });
  var cnt={}, otH={}; SLOTS.forEach(function(sl){ (daySol[sl]||[]).forEach(function(a){ cnt[a.id]=(cnt[a.id]||0)+1;
    a.slot=sl; otH[a.id]=(otH[a.id]||0)+hoursOf(a); }); });
  window._splitToday=cnt; window._otToday={};
  Object.keys(otH).forEach(function(id){ if(otH[id]-10>0.01) window._otToday[id]=Math.round((otH[id]-10)*10)/10; });
  var dayCount=Object.keys(cnt).length;
  var editable=isGenerated(sd)&&!!S.editMode&&!!getPin();   // แก้ได้เฉพาะ "โหมดแก้ไข" ที่ตั้งใจเข้า — หน้าดูปกติ = ดูอย่างเดียวล้วน
  var h='';
  if(S.editMode) h+='<div style="display:flex;align-items:center;gap:9px;background:#1A1A2E;border-radius:13px;padding:10px 13px;margin-top:10px;">'+svg(I_alert,15,'#F2B45A',2)+
    '<span style="flex:1;font-size:12px;color:#fff;font-weight:600;">โหมดแก้ไข — แตะคนเพื่อเอาออก/เปลี่ยน · แตะปุ่มเพิ่มคน</span>'+
    '<button onclick="exitEditMode()" style="border:none;border-radius:9px;background:#FF7E1D;color:#1A1A2E;font-weight:700;font-size:11.5px;padding:7px 12px;cursor:pointer;">เสร็จแล้ว</button></div>';
  h+='<div style="display:flex;gap:5px;margin-top:12px;">';
  DOW.forEach(function(dw,d){ var isSel=d===sd; var isToday=d===todayIdx; var gen=isGenerated(d);
    h+='<button onclick="selDay('+d+')" style="flex:1;background:'+(isSel?'#FF7E1D':'#fff')+';border:'+(isSel?'1.5px solid #FF7E1D':(isToday?'1.5px solid #F2B45A':'1.5px solid #EFE2D2'))+';border-radius:14px;padding:7px 1px;text-align:center;cursor:pointer;position:relative;">'+
      '<div style="font-size:10px;color:'+(isSel?'rgba(255,255,255,.8)':'#B0A090')+';">'+dw+'</div>'+
      '<div class="num" style="font-weight:700;font-size:13px;color:'+(isSel?'#fff':'#1A1A2E')+';margin-top:3px;">'+dates[d].getDate()+'</div>'+
      (gen?'<span style="position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:'+(isSel?'#fff':'#2C7A56')+';"></span>':'')+'</button>'; });
  h+='</div>';
  // นับคนที่อยู่จริงช่วงพีค (ตอบ "ตกลงช่วงนี้มีกี่คน" ตรงๆ)
  var all=[]; SLOTS.forEach(function(sl){ (daySol[sl]||[]).forEach(function(a){ a.slot=sl; all.push(a); }); });
  function atHour(hh){ var ids={}; all.forEach(function(a){ var iv=intervalOf(a); if(hh>=iv.s&&hh<iv.e) ids[a.id]=1;
    var h2=hh+24; if(h2>=iv.s&&h2<iv.e) ids[a.id]=1; }); return Object.keys(ids).length; }
  h+='<div style="background:linear-gradient(150deg,#7AD6E5,#4CC2D8);border-radius:22px;padding:13px 16px;margin-top:13px;color:#1A1A2E;box-shadow:0 16px 30px -22px rgba(26,26,46,.6);">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;">';
  h+='<span style="font-size:13px;font-weight:600;background:rgba(255,255,255,.26);padding:4px 12px;border-radius:20px;">'+DOWF[sd]+' '+dates[sd].getDate()+'</span>';
  h+='<span style="font-size:11px;font-weight:700;background:#fff;color:#2D7DA6;padding:5px 12px;border-radius:20px;">'+(isGenerated(sd)?'จัดแล้ว':'พรีวิว')+'</span></div>';
  h+='<div style="display:flex;align-items:baseline;gap:8px;margin-top:8px;"><span class="num" style="font-weight:800;font-size:26px;line-height:1;">'+dayCount+'</span><span style="font-size:14px;font-weight:600;">คนเข้างานวันนี้</span></div>';
  h+='<div style="font-size:12.5px;opacity:.85;margin-top:3px;">ช่วงเช้า (09:00) '+atHour(9)+' คน · พีคเที่ยง (11:00) '+atHour(11)+' คน · พีคเย็น (19:00) '+atHour(19)+' คน · ดึก (23:00) '+atHour(23)+' คน</div>';
  // แถบคนต่อชั่วโมง 08:00→03:00 — เห็นทันทีว่าช่วงไหนกี่คน
  h+='<div style="font-size:10px;font-weight:700;opacity:.75;margin-top:10px;">พนักงานต่อชั่วโมง</div>';
  h+='<div style="display:flex;gap:2px;margin-top:2px;align-items:flex-end;">';
  for(var hh=8;hh<=26;hh++){ var n=atHour(hh===24?0:(hh>24?hh-24:hh));
    var hgt=6+Math.min(n,8)*3.4;
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">'+
      '<span class="num" style="font-size:8.5px;font-weight:700;opacity:.85;">'+(n||'')+'</span>'+
      '<div style="width:100%;height:'+hgt+'px;border-radius:3px;background:rgba(255,255,255,'+(n?(0.35+Math.min(n,8)*0.075):0.14)+');"></div>'+
      '</div>'; }
  h+='</div>';
  // แนวโน้มออเดอร์ (ยอดขายเฉลี่ยล่าสุดของวันนี้ในสัปดาห์) — เทียบบรรทัดต่อบรรทัดกับแถบคนด้านบน
  var tr=SALES_TREND[branch.name]||SALES_TREND[branch.short];
  if(tr){ var avgDow=tr.dow.reduce(function(t,v){return t+v;},0)/7; var f=tr.dow[sd]/avgDow;

    if(totShort) h+='<div style="display:flex;align-items:center;gap:8px;background:#FBE6DE;border-radius:12px;padding:9px 12px;margin-top:6px;">'+svg(I_alert,14,'#C0392B',2)+'<span style="font-size:11.5px;color:#A2392B;font-weight:600;">กะหลักขาดรวม '+totShort+' ช่อง (ดูรายสาขาในแท็บดูตาราง)</span></div>';

    if(noRestAll.length) h+='<div style="display:flex;align-items:center;gap:8px;background:#FBE6DE;border-radius:12px;padding:9px 12px;margin-top:6px;">'+svg(I_alert,14,'#C0392B',2)+'<span style="font-size:11.5px;color:#A2392B;font-weight:600;">'+esc(noRestAll.join(' · '))+' — ไม่ได้หยุดเลย</span></div>';
    var tripKeys=Object.keys(allTrips);
    if(tripKeys.length){ h+='<div style="margin-top:8px;font-size:11.5px;font-weight:700;color:#6A4CC0;">การเดินทางข้ามสาขา ('+tripKeys.length+' เที่ยว)</div>';
      tripKeys.forEach(function(k){ var arr=allTrips[k];
        var tag=''; if(arr.length>1){ var starts={}; arr.forEach(function(x){ starts[x.start]=1; });
          tag = Object.keys(starts).length===1 ? ' <span style="color:#2C7A56;font-weight:700;">ไปด้วยกัน (รถรอบเดียว)</span>'
                                               : ' <span style="color:#B5651D;font-weight:700;">คนละเวลา</span>'; }
        h+='<div style="font-size:11px;color:#5A5A72;margin-top:3px;display:flex;gap:5px;align-items:flex-start;">'+svg(I_car,12,'#6A4CC0',1.8)+'<span>'+k+' — '+arr.map(function(x){return x.txt;}).join(' + ')+tag+'</span></div>'; }); }
    // กำลังคน vs แผน (ทั้งเครือ) — บอกตรงๆ ถ้าแผนเกินกำลัง
    var needAll=0, capAll=0;
    S.branches.forEach(function(b){
      for(var d=0;d<7;d++){ var dm=demandOf(b.plan,d); SLOTS.forEach(function(sl){ ['cook','kasst','cash'].forEach(function(p){ needAll+=(dm[sl][p]||0); }); }); }

    h+='<div style="margin-top:8px;font-size:11px;color:#5A7488;">แผนรายวันตั้งจากยอดขายจริง 13 สัปดาห์ (จ แรงสุด · พฤ+ศ เบาสุดทุกสาขา · พีค 10–12 และ 17–20) — วันหยุดพนักงานระบบจัดให้ตามหน้างาน วันเบาหยุดเยอะ วันแรงหยุดน้อย</div>';

    // ===== บันทึกชั่วโมงเพิ่ม (OT) สัปดาห์นี้ — ใช้คิดเงินเดือนเพิ่ม =====

    var otLog={}; // name -> {items:[], total}
    (function(){
      var perDay={}; // id -> {d: hours}
      S.branches.forEach(function(b){ var sb=allSol[b.id]; for(var d=0;d<7;d++){
        SLOTS.forEach(function(sl){ (sb.week[d][sl]||[]).forEach(function(a){ a.slot=sl;
          perDay[a.id]=perDay[a.id]||{}; perDay[a.id][d]=(perDay[a.id][d]||0)+hoursOf(a); }); }); } });
      Object.keys(perDay).forEach(function(id){ var e=empById(id); if(!e) return;
        var days=Object.keys(perDay[id]).map(Number);
        var extraDays=[];
        if(days.length>6){ var sorted=days.slice().sort(function(a,b){return perDay[id][a]-perDay[id][b];});

        days.sort(function(a,b){return a-b;}).forEach(function(d){ var hrs=perDay[id][d];

          var away=null; S.branches.forEach(function(b2){ if(b2.id===b.id) return;
            SLOTS.forEach(function(sl){ (allSol[b2.id].week[c.d][sl]||[]).forEach(function(a){ if(a.id===e.id) away=b2.short||b2.name; }); }); });

    });
    var drainU=[]; drainAll.forEach(function(x){ if(drainU.indexOf(x)<0) drainU.push(x); });

    var otNames=Object.keys(otLog);
    h+='<div style="background:#fff;border:1.5px solid '+(otNames.length?'#F2C063':'#F3EADD')+';border-radius:16px;padding:13px 15px;margin-top:13px;">';

      otNames.sort(function(a,b){return otLog[b].total-otLog[a].total;}).forEach(function(n){ var o=otLog[n];
        h+='<div style="display:flex;align-items:baseline;gap:8px;margin-top:8px;border-bottom:1px solid #F6EDE0;padding-bottom:7px;">'+

    setupSug.forEach(function(s){ h+='<div style="display:flex;align-items:center;gap:10px;margin-top:7px;"><span style="width:32px;height:32px;border-radius:10px;background:#EDE8FB;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_person,17,'#6A4CC0')+'</span>'+

  }

  // พนักงาน

    '<button onclick="addEmp()" style="border:1.5px solid #EFD9CF;background:#fff;border-radius:11px;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:700;font-size:12px;color:#C77A1B;">'+svg(I_plus,14,'#C77A1B',2.4)+'เพิ่มคน</button></div>';
  if(branchEmpty){ h+='<div style="background:#fff;border:1.5px dashed #E2D3C0;border-radius:16px;padding:30px 18px;text-align:center;color:#9A8C7C;font-size:13px;">ยังไม่มีพนักงาน — กด "เพิ่มคน"</div>'; return h; }
  h+='<div style="display:flex;flex-direction:column;gap:10px;">';

    var slotText=((e.preferredSlots&&e.preferredSlots.length)?e.preferredSlots:['morning','mid','late']).map(function(s){return (PREFM[s]||{label:s}).label;}).join('/');
    var offText=(e.off&&e.off.length)?e.off.slice().sort(function(a,b){return a-b;}).map(function(d){return DOW[d];}).join(','):'—';
    h+='<div onclick="editEmp(\''+e.id+'\')" style="background:#fff;border-radius:16px;padding:13px 15px;cursor:pointer;box-shadow:0 10px 24px -22px rgba(26,26,46,.5);border:1px solid #F3EADD;">'+
      '<div style="display:flex;align-items:center;gap:11px;"><span style="width:38px;height:38px;border-radius:12px;background:'+m.bg+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_person,20,m.color)+'</span>'+
      '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;">'+esc(e.name)+
        (e.loanOk?' <span style="font-size:9.5px;color:#6A4CC0;background:#EDE8FB;padding:1px 6px;border-radius:5px;font-weight:700;">ช่วยสาขาอื่น</span>':'')+
        (e.commuteGroup?' <span style="font-size:9.5px;color:#6A4CC0;background:#EDE8FB;padding:1px 6px;border-radius:5px;font-weight:700;display:inline-flex;align-items:center;gap:2px;">'+svg(I_car,10,'#6A4CC0',1.8)+'คู่รถ</span>':'')+
        (e.canOt?' <span style="font-size:9.5px;color:#B5651D;background:#FFF1D6;padding:1px 6px;border-radius:5px;font-weight:700;">OT</span>':'')+
        (e.canSplit?' <span style="font-size:9.5px;color:#B5651D;background:#FFF1D6;padding:1px 6px;border-radius:5px;font-weight:700;">เบรค</span>':'')+
        '</div><div style="font-size:11px;color:#9A8C7C;margin-top:1px;">'+esc(posText)+'</div></div>'+
      svg(I_chev,16,'#C7BEB0',2.2)+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">'+
      '<span style="display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:#5A7488;background:#EEF4F8;padding:4px 9px;border-radius:8px;">'+svg(I_clock,11,'#5A7488',2)+esc(slotText)+'</span>'+
      '<span style="display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:#9A7A55;background:#F6EFE4;padding:4px 9px;border-radius:8px;">'+svg(I_cal,11,'#9A7A55',2)+'หยุด '+esc(offText)+'</span></div></div>'; });
  h+='</div><div style="height:8px;"></div>';
  return h;
}

/* sheet แก้ไข cell (คน/เพิ่ม) พร้อมเหตุผล → เรียนรู้ */
function sheetWrap(inner){
  return '<div onclick="closeCell()" style="position:fixed;inset:0;max-width:440px;margin:0 auto;z-index:70;background:rgba(26,26,46,.45);display:flex;flex-direction:column;justify-content:flex-end;animation:fade .2s ease;">'+
    '<div onclick="event.stopPropagation()" class="scr" style="background:#FFF6EC;border-radius:30px 30px 0 0;padding:10px 20px calc(20px + env(safe-area-inset-bottom));max-height:88%;overflow-y:auto;animation:rise .26s cubic-bezier(.2,.9,.3,1);">'+
    '<div style="width:42px;height:5px;border-radius:3px;background:#E2D3C0;margin:6px auto 15px;"></div>'+inner+
    '<button onclick="closeCell()" style="width:100%;margin-top:9px;border:none;background:none;padding:10px;cursor:pointer;font-weight:600;font-size:12.5px;color:#9A8C7C;">ปิด</button><div style="height:6px;"></div></div></div>';
}
function renderCellSheet(){
  var c=S.editCell;
  if(c.type==='person'){ var e=empById(c.empId)||{name:'?'};
    var h='<div style="font-weight:700;font-size:18px;">'+esc(e.name)+' · กะ'+SLOTM[c.slot].label+' '+DOWF[c.d]+'</div>';
    h+='<div style="font-size:12px;color:#9A8C7C;margin-top:3px;">เอาออกจากกะนี้ — เลือกเหตุผลเพื่อให้ระบบจัดดีขึ้นครั้งหน้า</div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">';
    h+='<button onclick="removePerson(\'ไม่ถนัดกะนี้\',\'avoid_slot\',-70)" style="border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;cursor:pointer;text-align:left;font-weight:600;font-size:13.5px;color:#1A1A2E;">ไม่ถนัด/ไม่ชอบกะนี้ <span style="font-size:10.5px;color:#6A4CC0;">· จำไว้ว่าเลี่ยงกะนี้</span></button>';
    h+='<button onclick="removePerson(\'ติดธุระวันนี้\',\'avoid_day\',-80)" style="border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;cursor:pointer;text-align:left;font-weight:600;font-size:13.5px;color:#1A1A2E;">ติดธุระ/ลาวันนี้ <span style="font-size:10.5px;color:#6A4CC0;">· จำไว้ว่าเลี่ยงวันนี้</span></button>';
    h+='<button onclick="removePerson(\'คนเยอะเกิน\',null,0)" style="border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;cursor:pointer;text-align:left;font-weight:600;font-size:13.5px;color:#1A1A2E;">คนเยอะเกินไป <span style="font-size:10.5px;color:#9A8C7C;">· แค่เอาออก ไม่จำ</span></button>';
    h+='<button onclick="removePerson(\'อื่นๆ\',null,0)" style="border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;cursor:pointer;text-align:left;font-weight:600;font-size:13.5px;color:#1A1A2E;">เหตุผลอื่น</button>';
    h+='</div>';
    return sheetWrap(h);
  }
  // add
  // คนที่ถูกจัดในกะนี้แล้ว (กันซ้ำในกะเดียว) — คนที่อยู่กะอื่นวันเดียวกันเพิ่มได้ถ้าเป็น OT/เบรค
  var inSlot={}; ((S.grid[c.bid]&&S.grid[c.bid][c.d]&&S.grid[c.bid][c.d][c.slot])||[]).forEach(function(a){ inSlot[a.id]=1; });
  if(!isGenerated(c.d)){ var sol=getSol(); (sol[c.bid].week[c.d][c.slot]||[]).forEach(function(a){ inSlot[a.id]=1; }); }
  var cands=S.employees.filter(function(e){ return (e.branchId===c.bid || e.loanOk) && !inSlot[e.id] && (e.off||[]).indexOf(c.d)<0
    && (!SLOTM[c.slot].splitOnly || e.canSplit); });   // พีคสั้นเฉพาะคนเบรค
  var h='<div style="font-weight:700;font-size:18px;">เพิ่มคน · กะ'+SLOTM[c.slot].label+' '+DOWF[c.d]+'</div>';
  h+='<div style="font-size:12px;color:#9A8C7C;margin-top:3px;">คนที่ว่างวันนี้ (แตะเพื่อเพิ่ม · ล็อกอัตโนมัติ)</div>';
  h+='<div style="display:flex;flex-direction:column;gap:7px;margin-top:12px;">';
  if(!cands.length) h+='<div style="color:#9A8C7C;font-size:13px;padding:10px 0;">ไม่มีคนว่างเพิ่มได้แล้ว</div>';
  cands.forEach(function(e){ var m=POSM[(e.positions&&e.positions[0])||'cook']||POSM.cook; var loan=e.branchId!==c.bid;
    h+='<div style="display:flex;align-items:center;gap:9px;padding:5px 0;"><span style="width:32px;height:32px;border-radius:10px;background:'+m.bg+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_person,17,m.color)+'</span>'+
      '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13px;">'+esc(e.name)+(loan?' <span style="font-size:9px;color:#C4571E;background:#FFE9D6;padding:1px 5px;border-radius:4px;">ข้ามสาขา</span>':'')+'</div><div style="font-size:10px;color:#9A8C7C;">'+(e.positions||[]).map(function(p){return POSM[p]?POSM[p].label:p;}).join('/')+'</div></div>'+
      '<button onclick="addPerson(\''+e.id+'\',\'prefer_slot\')" style="border:none;border-radius:10px;background:#2C7A56;color:#fff;font-weight:700;font-size:11.5px;padding:8px 13px;cursor:pointer;flex:0 0 auto;">เพิ่ม</button></div>'; });
  h+='</div>';
  return sheetWrap(h);
}

function renderSheet(){
  var d=S.editEmp;
  var isEdit=!!d.id;
  var canSave=!!(d.name&&d.name.trim()&&d.positions&&d.positions.length);
  var h='<div onclick="closeSheet()" style="position:fixed;inset:0;max-width:440px;margin:0 auto;z-index:60;background:rgba(26,26,46,.45);display:flex;flex-direction:column;justify-content:flex-end;animation:fade .2s ease;">';
  h+='<div onclick="event.stopPropagation()" class="scr" style="background:#FFF6EC;border-radius:30px 30px 0 0;padding:10px 20px calc(20px + env(safe-area-inset-bottom));max-height:92%;overflow-y:auto;animation:rise .26s cubic-bezier(.2,.9,.3,1);">';
  h+='<div style="width:42px;height:5px;border-radius:3px;background:#E2D3C0;margin:6px auto 15px;"></div>';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;"><div style="font-weight:700;font-size:18px;">'+(isEdit?'แก้ไขพนักงาน':'เพิ่มพนักงาน')+'</div>'+
    (isEdit?'<button onclick="deleteEmp()" style="border:none;background:none;cursor:pointer;color:#B24A2E;font-weight:700;font-size:12.5px;padding:6px;">ลบ</button>':'')+'</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">ชื่อ</label>';
  h+='<input value="'+esc(d.name)+'" oninput="setName(this.value)" placeholder="เช่น บีม สุทธิดา" style="width:100%;border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;font-family:\'Anuphan\',sans-serif;font-size:16px;color:#1A1A2E;">';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">ตำแหน่งที่ทำได้ <span style="color:#B0A090;font-weight:600;">(อันแรก = ตำแหน่งหลัก)</span></label>';
  h+='<div style="display:flex;gap:7px;">';
  ['cook','kasst','cash'].forEach(function(k){ var on=d.positions.indexOf(k)>=0; var m=POSM[k];
    h+='<button onclick="toggleArr(\'positions\',\''+k+'\')" style="flex:1;border:1.5px solid '+(on?m.color:'#EFD9CF')+';background:'+(on?m.bg:'#fff')+';color:'+(on?m.color:'#8A7E6E')+';border-radius:13px;padding:11px 4px;cursor:pointer;font-weight:700;font-size:12.5px;">'+m.label+'</button>'; });
  h+='</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">กะที่สะดวก</label>';
  h+='<div style="display:flex;gap:7px;">';
  ['morning','mid','late'].forEach(function(db){ var on=d.preferredSlots.indexOf(db)>=0; var m=PREFM[db];
    h+='<button onclick="toggleArr(\'preferredSlots\',\''+db+'\')" style="flex:1;border:1.5px solid '+(on?'#C77A1B':'#EFD9CF')+';background:'+(on?'#FFF3E6':'#fff')+';color:'+(on?'#C2510F':'#8A7E6E')+';border-radius:13px;padding:11px 4px;cursor:pointer;font-weight:700;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:'+m.dot+';"></span>'+m.label+'</button>'; });
  h+='</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">วันหยุดที่ขอ <span style="color:#B0A090;font-weight:600;">(ระบบพยายามให้ แต่ย้ายได้ตามหน้างาน)</span></label>';
  h+='<div style="display:flex;gap:5px;">';
  DOW.forEach(function(dw,i){ var on=d.off.indexOf(i)>=0;
    h+='<button onclick="toggleArr(\'off\','+i+')" style="flex:1;min-width:0;border:1.5px solid '+(on?'#C0392B':'#EFD9CF')+';background:'+(on?'#FBE6DE':'#fff')+';color:'+(on?'#B24A2E':'#8A7E6E')+';border-radius:11px;padding:9px 0;cursor:pointer;font-weight:700;font-size:12px;">'+dw+'</button>'; });
  h+='</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">วันเริ่มงาน <span style="color:#B0A090;font-weight:600;">(ใช้จัดตาราง — ไม่จัดก่อนวันนี้ · คิดเงินเดือน)</span></label>';
  h+='<input type="date" value="'+esc(d.hiredAt||'')+'" onchange="setHired(this.value)" style="width:100%;border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:12px 14px;font-family:\'Anuphan\',sans-serif;font-size:15px;color:#1A1A2E;">';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">สาขาหลัก</label>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;">';
  S.branches.forEach(function(b){ var on=d.branchId===b.id;
    h+='<button onclick="pickDraftBranch(\''+b.id+'\')" style="border:1.5px solid '+(on?'#FF7E1D':'#EFD9CF')+';background:'+(on?'#FFF3E6':'#fff')+';color:'+(on?'#C2510F':'#8A7E6E')+';border-radius:13px;padding:10px 15px;cursor:pointer;font-weight:700;font-size:12.5px;">'+esc(b.name)+'</button>'; });
  h+='</div>';
  var lon=!!d.loanOk;
  h+='<button onclick="toggleLoan()" style="width:100%;margin-top:16px;border:1.5px solid '+(lon?'#C77A1B':'#EFD9CF')+';background:'+(lon?'#FFF3E6':'#fff')+';border-radius:14px;padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;text-align:left;">'+
    '<span style="width:34px;height:34px;border-radius:10px;background:#EDE8FB;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_arrow,18,'#6A4CC0')+'</span>'+
    '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13.5px;color:'+(lon?'#C2510F':'#8A7E6E')+';">รับไปช่วยสาขาอื่นได้</div><div style="font-size:10.5px;color:#9A8C7C;margin-top:1px;">ระบบจะดึงไปช่วยสาขาที่คนไม่พอ</div></div>'+
    '<span style="width:26px;height:26px;border-radius:8px;border:2px solid '+(lon?'#C77A1B':'#EFD9CF')+';background:'+(lon?'#FFF3E6':'#fff')+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+(lon?svg(I_check,15,'#C2510F',3):'')+'</span></button>';
  h+=capToggle('toggleOt()', !!d.canOt, I_clock, 'ทำเกินเวลา (OT) ได้', 'ทำได้ถึง 7 วัน/สัปดาห์ (เพดาน 72 ชม.)');
  h+=capToggle('toggleSplit()', !!d.canSplit, I_refresh, 'ทำกะเบรคได้', 'คู่พีคเที่ยง 10–14 + พีคเย็น 17–21 วันเดียว (พักบ่าย) — คนอื่นต้องเต็ม 10 ชม.');
  h+='<button onclick="saveEmp()" style="width:100%;margin-top:20px;border:none;border-radius:16px;background:'+(canSave?'#FF7E1D':'#F0E2D2')+';color:'+(canSave?'#1A1A2E':'#C0B4A2')+';font-weight:700;font-size:15px;padding:15px;cursor:'+(canSave?'pointer':'not-allowed')+';">บันทึก</button>';
  h+='<button onclick="closeSheet()" style="width:100%;margin-top:9px;border:none;background:none;padding:8px;cursor:pointer;font-weight:600;font-size:12.5px;color:#9A8C7C;">ยกเลิก</button><div style="height:6px;"></div>';
  h+='</div></div>';
  return h;
}

load();

// ===== อัปเดตอัตโนมัติ — ตารางเปลี่ยนที่ไหน ทุกเครื่องเห็นเองใน ~45 วิ (หรือทันทีที่เปิดแอปกลับมา) =====
var _syncKey=null, _lastSync=0, _syncWeek=null;
function syncCheck(force){ var now=Date.now();
  if(!force && now-_lastSync<40000) return;
  if(S.loading) return; _lastSync=now;
  Promise.all([api('sched_all'), api('sched_grid_get',{p_week:weekStartIso()})]).then(function(res){
    var key=JSON.stringify([res[0].seed, res[0].branches, res[0].employees, res[1]]);
    if(_syncKey===null || _syncWeek!==S.weekOffset){ _syncKey=key; _syncWeek=S.weekOffset; return; }  // เปลี่ยนสัปดาห์ = ตั้งฐานใหม่ ไม่ใช่อัปเดต
    if(key===_syncKey) return;
    _syncKey=key;
    if(S.editEmp||S.editCell||S.pinAsk||S.genOpen) return;   // กำลังแก้อยู่ อย่าทับ
    S.branches=res[0].branches; S.employees=res[0].employees; S.seed=res[0].seed; S.learnings=res[0].learnings||[];
    if(!S.activeBranch||!S.branches.some(function(b){return b.id===S.activeBranch;})) S.activeBranch=(S.branches[0]||{}).id;
    S.grid=res[1]||{};
    render(); toast('ตารางอัปเดตแล้ว');
  }).catch(function(){});
}
setInterval(function(){ syncCheck(false); }, 45000);
document.addEventListener('visibilitychange', function(){ if(!document.hidden) syncCheck(true); });
setTimeout(function(){ syncCheck(true); }, 4000);   // ตั้ง baseline หลังโหลดครั้งแรก
</script>
