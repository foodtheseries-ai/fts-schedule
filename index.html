function api(fn,args){ return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',
  headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'},
  body:JSON.stringify(args||{})}).then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);});
  return r.status===204?null:r.json(); }); }

/* ===== meta (ตรง prototype) ===== */
var POSM={cook:{label:'กุ๊ก',color:'#C4571E',bg:'#FBE9D2'}, kasst:{label:'ผู้ช่วยครัว',color:'#2C7A56',bg:'#DCEFE4'}, cash:{label:'แคชเชียร์',color:'#2960C4',bg:'#E4F0FF'}};
var SLOTM={morning:{label:'เช้า',dot:'#F2B45A'}, mid:{label:'กลาง',dot:'#6A5AC0'}, night:{label:'ดึก',dot:'#3E8FC4'}};
var DOW=['จ','อ','พ','พฤ','ศ','ส','อา'];
var DOWF=['จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์','อาทิตย์'];
var SLOT_DB2ENG={morning:'morning',mid:'mid',late:'night'};
function demandOf(){ return {morning:{cook:1,kasst:1,cash:1}, mid:{cook:0,kasst:0,cash:0}, night:{cook:1,kasst:1,cash:1}}; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function hashN(str){ var h=0; for(var i=0;i<str.length;i++) h=((h*31)+str.charCodeAt(i))>>>0; return h; }
function weekDates(){ var t=new Date(); var wd=(t.getDay()+6)%7; var mon=new Date(t); mon.setHours(0,0,0,0); mon.setDate(t.getDate()-wd);
  var arr=[]; for(var d=0;d<7;d++){ var x=new Date(mon); x.setDate(mon.getDate()+d); arr.push(x); } return arr; }

/* ===== ICONS (inline stroke svg — ห้ามอีโมจิ) ===== */
function svg(inner,s,st,sw){ s=s||18; return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="'+(st||'currentColor')+'" stroke-width="'+(sw||1.8)+'" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>'; }
var I_person='<circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/>';

var I_alert='<path d="M12 4 3 19h18L12 4Z"/><path d="M12 10v4M12 16.5v.2"/>';
var I_check='<path d="M5 12.5l4.5 4.5L19 7"/>';

var I_cal2='<path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/><path d="M9 15l2 2 4-4"/>';
var I_clock='<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>';
var I_users='<path d="M16 3.1a4 4 0 0 1 0 7.8M22 21v-2a4 4 0 0 0-3-3.8M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM2 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/>';
var I_arrow='<path d="M5 12h14M13 6l6 6-6 6"/>';
var I_plus='<path d="M12 5v14M5 12h14"/>';
var I_chev='<path d="M9 6l6 6-6 6"/>';
var I_userplus='<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20c.6-3.8 3-6 6.5-6s5.9 2.2 6.5 6"/><path d="M17 8h6M20 5v6"/>';

/* ===== ENGINE (solveAll — จัดทุกสาขาพร้อมกัน ยืมข้ามสาขาสลับเวียน · ตรง prototype) ===== */
function solveAll(state){
  var POS=['cook','kasst','cash'];
  var demand=demandOf();
  var seed=state.seed||1;
  var branches=state.branches;
  var brName={}; branches.forEach(function(b){ brName[b.id]=b.short||b.name; });
  var E=state.employees.map(function(e){
    var pref=(e.preferredSlots&&e.preferredSlots.length)?e.preferredSlots.map(function(s){return SLOT_DB2ENG[s]||s;}):['morning','mid','night'];
    return { id:e.id, name:e.name, branchId:e.branchId,
      positions:(e.positions&&e.positions.length)?e.positions:[],
      pref:pref, home:pref[0]||'morning',
      off:e.off||[], loanOk:!!e.loanOk }; });
  var weeks={}; branches.forEach(function(b){ weeks[b.id]={}; for(var d=0;d<7;d++) weeks[b.id][d]={morning:[],mid:[],night:[]}; });
  var gAssigned={}, gWork={}, gLoan={};
  var assignedG=function(id,d){ return !!gAssigned[id+'|'+d]; };
  var prevNightB=function(bid,id,d){ return d>0 && weeks[bid][d-1].night.some(function(a){return a.id===id;}); };
  var workCount=function(id){ return gWork[id]||0; };
  var cellPos=function(bid,d,slot,pos){ return weeks[bid][d][slot].filter(function(a){return a.pos===pos;}).length; };
  var doAssign=function(bid,d,slot,e,pos,via){ weeks[bid][d][slot].push({id:e.id,pos:pos,via:via,homeBranch:e.branchId});
    gAssigned[e.id+'|'+d]=true; gWork[e.id]=(gWork[e.id]||0)+1; if(via==='loan') gLoan[e.id]=(gLoan[e.id]||0)+1; };
  var eligible=function(e,bid,d,slot,pos,loan){
    if(e.positions.indexOf(pos)<0) return false;              // H5
    if(e.off.indexOf(d)>=0) return false;                     // H2
    if(assignedG(e.id,d)) return false;                       // H1 global
    if(slot==='morning'&&prevNightB(bid,e.id,d)) return false; // H4
    if(workCount(e.id)>=6) return false;                      // H3
    if(loan){ if(e.branchId===bid) return false; if(!e.loanOk) return false; }
    else { if(e.branchId!==bid) return false; }
    return true; };
  var score=function(e,bid,d,slot,pos,loan){
    var s=0;
    s += (e.positions[0]===pos)?1000:300;
    s += (e.pref.indexOf(slot)>=0)?40:-40;
    s += (e.home===slot)?25:0;
    s -= 30*workCount(e.id);
    if(loan) s -= 250 + 80*(gLoan[e.id]||0);                  // สลับตัวช่วยเวียนกัน
    s += (hashN(e.id+'|'+bid+'|'+d+'|'+slot+'|'+seed)%100)*0.05;
    return s; };
  var pick=function(bid,d,slot,pos,loan){ var best=null,bs=-1e9; E.forEach(function(e){ if(!eligible(e,bid,d,slot,pos,loan))return;
    var s=score(e,bid,d,slot,pos,loan); if(s>bs){bs=s;best=e;} }); return best; };
  // PASS 1 คนสาขาตัวเอง
  for(var d=0;d<7;d++){ (function(d){ branches.forEach(function(b){ var bid=b.id;
    ['morning','night','mid'].forEach(function(slot){ POS.forEach(function(pos){ var g=0;
      while(cellPos(bid,d,slot,pos)<(demand[slot][pos]||0)&&g<20){ var c=pick(bid,d,slot,pos,false); if(!c)break; doAssign(bid,d,slot,c,pos,'home'); g++; } }); }); }); })(d); }
  // PASS 2 ยืมข้ามสาขา (เฉพาะ min กะหลักที่ยังขาด)
  var loaners={}; branches.forEach(function(b){ loaners[b.id]=[]; });
  for(var d2=0;d2<7;d2++){ (function(d){ branches.forEach(function(b){ var bid=b.id;
    ['morning','night'].forEach(function(slot){ POS.forEach(function(pos){ var g=0;
      while(cellPos(bid,d,slot,pos)<(demand[slot][pos]||0)&&g<20){ var c=pick(bid,d,slot,pos,true); if(!c)break;
        doAssign(bid,d,slot,c,pos,'loan'); loaners[bid].push({name:c.name,from:brName[c.branchId],d:d,slot:slot,pos:pos}); g++; } }); }); }); })(d2); }
  // reports
  var result={};
  branches.forEach(function(b){ var bid=b.id; var week=weeks[bid];
    var bEmps=E.filter(function(e){return e.branchId===bid;});
    var shortDays=[]; var coverShort=[];
    for(var d=0;d<7;d++){ (function(d){ ['morning','night'].forEach(function(slot){ POS.forEach(function(pos){
      var need=demand[slot][pos]||0; var got=cellPos(bid,d,slot,pos); if(got<need) coverShort.push({d:d,slot:slot,pos:pos,short:need-got}); }); }); })(d); }
    coverShort.forEach(function(c){ if(shortDays.indexOf(c.d)<0) shortDays.push(c.d); });
    var seen={}; var suggestions=[];
    coverShort.forEach(function(c){ E.forEach(function(e){
      if(e.branchId===bid) return; if(e.loanOk) return;
      if(e.positions.indexOf(c.pos)<0) return; if(e.off.indexOf(c.d)>=0) return; if(assignedG(e.id,c.d)) return;
      var key=e.id+'|'+c.d; if(seen[key]) return; seen[key]=1;
      suggestions.push({empId:e.id,name:e.name,from:brName[e.branchId],d:c.d,slot:c.slot,pos:c.pos}); }); });
    var noRest=bEmps.filter(function(e){return workCount(e.id)>=7;}).map(function(e){return e.name;});
    var fair=bEmps.map(function(e){ var days=0,hours=0; for(var d=0;d<7;d++){ ['morning','mid','night'].forEach(function(s){
      if(week[d][s].some(function(a){return a.id===e.id;})){ days++; hours+= s==='mid'?6:10; } }); } return {id:e.id,name:e.name,days:days,hours:hours}; });
    var offByDay={}; for(var d3=0;d3<7;d3++){ (function(d){ offByDay[d]=bEmps.filter(function(e){return e.off.indexOf(d)>=0;}).map(function(e){return e.name;}); })(d3); }
    result[bid]={ week:week, coverShort:coverShort, shortDays:shortDays, noRest:noRest, fair:fair, loaners:loaners[bid], suggestions:suggestions, offByDay:offByDay };
  });
  return result;
}

/* ===== STATE ===== */
var S={ mode:'view', seed:7, selDay:null, activeBranch:null, branches:[], employees:[], editEmp:null, toast:null, loading:true };
var _tt=null;
function toast(m){ S.toast=m; render(); clearTimeout(_tt); _tt=setTimeout(function(){ S.toast=null; render(); },1900); }
function empById(id){ return S.employees.find(function(x){return x.id===id;}); }

function load(){
  api('sched_all').then(function(d){
    S.branches=d.branches; S.employees=d.employees; S.seed=d.seed;
    if(!S.activeBranch||!S.branches.some(function(b){return b.id===S.activeBranch;})) S.activeBranch=(S.branches[0]||{}).id;
    S.loading=false; render();
  }).catch(function(e){ S.loading=false; document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#C0392B;">โหลดไม่สำเร็จ<br><small>'+esc(e.message)+'</small></div>'; });
}

/* ===== ACTIONS ===== */
function goView(){ S.mode='view'; render(); }
function goSetup(){ S.mode='setup'; render(); }
function pickBranch(bid){ S.activeBranch=bid; S.selDay=null; S.editEmp=null; render(); }
function selDay(d){ S.selDay=d; render(); }
function regenerate(){ api('sched_seed_bump').then(function(seed){ S.seed=seed; toast('จัดตารางใหม่แล้ว'); }); }
function enableLoan(empId,who){ var e=empById(empId); if(!e) return; api('sched_emp_save',rpcArgs(e,{loanOk:true})).then(function(){
    e.loanOk=true; toast('ให้ '+who+' มาช่วยแล้ว'); }); }
function addEmp(){ S.editEmp={id:null,branchId:S.activeBranch,name:'',positions:[],preferredSlots:[],off:[],loanOk:false}; S.mode='setup'; render(); }
function editEmp(id){ var e=empById(id); S.editEmp=Object.assign({},e,{positions:(e.positions||[]).slice(),preferredSlots:(e.preferredSlots||[]).slice(),off:(e.off||[]).slice()}); S.mode='setup'; render(); }
function closeSheet(){ S.editEmp=null; render(); }
function setName(v){ if(S.editEmp) S.editEmp.name=v; }         // ไม่ rerender (กัน input เสีย focus)
function toggleArr(field,val){ var a=(S.editEmp[field]||[]).slice(); var i=a.indexOf(val); if(i>=0)a.splice(i,1); else a.push(val); S.editEmp[field]=a; render(); }
function pickDraftBranch(bid){ S.editEmp.branchId=bid; render(); }
function toggleLoan(){ S.editEmp.loanOk=!S.editEmp.loanOk; render(); }
function rpcArgs(e,over){ var m=Object.assign({},e,over||{});
  return { p_id:m.id, p_branch:m.branchId, p_name:m.name,
    p_positions:m.positions, p_slots:(m.preferredSlots||[]), p_off:m.off||[], p_loan:!!m.loanOk }; }
function saveEmp(){ var d=S.editEmp; if(!d||!d.name||!d.name.trim()||!d.positions||!d.positions.length){ toast('ใส่ชื่อและตำแหน่งก่อน'); return; }
  d.name=d.name.trim();
  api('sched_emp_save',rpcArgs(d)).then(function(newId){
    if(d.id){ var e=empById(d.id); if(e) Object.assign(e,{name:d.name,branchId:d.branchId,positions:d.positions,preferredSlots:d.preferredSlots,off:d.off,loanOk:d.loanOk}); }
    else { S.employees.push({id:newId,name:d.name,branchId:d.branchId,positions:d.positions,preferredSlots:d.preferredSlots,off:d.off,loanOk:d.loanOk}); }
    S.editEmp=null; toast('บันทึกแล้ว');
  }).catch(function(e){ toast('บันทึกไม่สำเร็จ'); }); }
function deleteEmp(){ var id=S.editEmp.id; if(!id){ closeSheet(); return; }
  api('sched_emp_delete',{p_id:id}).then(function(){ S.employees=S.employees.filter(function(x){return x.id!==id;}); S.editEmp=null; toast('ลบแล้ว'); }); }

/* ===== RENDER ===== */
function render(){
  var app=document.getElementById('app');
  if(S.loading){ app.innerHTML='<div style="padding:60px 20px;text-align:center;color:#9A8C7C;">กำลังโหลด…</div>'; return; }
  var bid=S.activeBranch;
  var branch=S.branches.find(function(b){return b.id===bid;})||S.branches[0]||{name:'',short:''};
  var isView=S.mode==='view';
  var branchEmps=S.employees.filter(function(e){return e.branchId===bid;});
  var branchEmpty=branchEmps.length===0;
  var dates=weekDates();
  var todayIdx=(new Date().getDay()+6)%7;
  var sd=(typeof S.selDay==='number')?S.selDay:todayIdx;
  var sol=solveAll(S)[bid];

  var h='';
  h+='<div style="padding:14px 20px 8px;flex:0 0 auto;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;">';
  h+='<div style="font-weight:700;letter-spacing:-.4px;font-size:22px;color:#3E8FC4;">ตารางกะ</div>';
  h+='<div style="display:flex;gap:4px;background:#F1E7D8;padding:3px;border-radius:11px;">';
  h+=tabBtn('ดูตาราง',isView,'goView()'); h+=tabBtn('ตั้งค่า',!isView,'goSetup()');
  h+='</div></div>';
  h+='<div class="scr" style="display:flex;gap:6px;margin-top:11px;overflow-x:auto;">';
  S.branches.forEach(function(b){ var on=b.id===bid;
    h+='<button onclick="pickBranch(\''+b.id+'\')" style="flex:0 0 auto;border:none;border-radius:11px;padding:7px 13px;cursor:pointer;font-weight:700;font-size:12.5px;white-space:nowrap;background:'+(on?'#1A1A2E':'#F1E7D8')+';color:'+(on?'#fff':'#7A6A57')+';">'+esc(b.name)+'</button>'; });
  h+='</div></div>';

  h+='<div class="scr" style="flex:1;overflow-y:auto;padding:6px 20px 30px;">';
  h+= isView ? renderView(bid,branch,branchEmps,branchEmpty,dates,todayIdx,sd,sol)
             : renderSetup(bid,branch,branchEmps,branchEmpty,sol);
  h+='</div>';

  if(S.editEmp) h+=renderSheet();
  if(S.toast) h+='<div style="position:fixed;left:50%;transform:translateX(-50%);max-width:400px;width:calc(100% - 40px);bottom:22px;z-index:70;background:#1A1A2E;color:#fff;border-radius:14px;padding:13px 16px;font-size:13px;font-weight:600;text-align:center;animation:rise .24s ease;box-shadow:0 18px 40px -18px rgba(0,0,0,.6);">'+esc(S.toast)+'</div>';

  app.innerHTML=h;
}
function tabBtn(label,on,fn){ return '<button onclick="'+fn+'" style="border:none;border-radius:9px;padding:7px 14px;cursor:pointer;font-weight:700;font-size:12px;background:'+(on?'#fff':'transparent')+';color:'+(on?'#1A1A2E':'#8A7E6E')+';box-shadow:'+(on?'0 3px 8px -4px rgba(0,0,0,.3)':'none')+';">'+label+'</button>'; }

function personCard(a,time){ var m=POSM[a.pos]||{}; var e=empById(a.id)||{name:'?'};
  var loan = a.via==='loan';
  var h='<div style="background:#fff;border-radius:16px;padding:8px 12px;display:flex;align-items:center;gap:11px;box-shadow:0 8px 20px -20px rgba(26,26,46,.4);">';
  h+='<span style="width:34px;height:34px;border-radius:50%;background:'+m.bg+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_person,20,m.color)+'</span>';
  h+='<div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:13.5px;">'+esc(e.name)+'</div>';
  h+='<div style="font-size:11px;font-weight:600;color:'+m.color+';margin-top:1px;">'+m.label+'</div>';
  if(loan){ var from=(S.branches.find(function(b){return b.id===a.homeBranch;})||{}).short||'';
    h+='<div style="display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;color:#C4571E;background:#FFE9D6;padding:2px 7px;border-radius:6px;margin-top:4px;">'+svg(I_arrow,10,'#C4571E',2)+'ช่วยจาก '+esc(from)+'</div>'; }
  h+='</div>';
  h+='<span class="num" style="font-weight:700;font-size:12.5px;color:#3A4A55;background:#F1F5F8;padding:5px 10px;border-radius:9px;white-space:nowrap;flex:0 0 auto;">'+time+'</span>';
  h+='</div>';
  return h;
}

function renderView(bid,branch,branchEmps,branchEmpty,dates,todayIdx,sd,sol){
  if(branchEmpty){
    return '<div style="text-align:center;padding:60px 16px;animation:fade .3s;">'+
      '<div style="width:60px;height:60px;margin:0 auto;border-radius:19px;background:#FBEEDD;display:flex;align-items:center;justify-content:center;">'+svg(I_userplus,28,'#C2510F')+'</div>'+
      '<div style="font-weight:700;font-size:16px;margin-top:14px;">ยังไม่มีพนักงานในสาขานี้</div>'+
      '<div style="font-size:12.5px;color:#8A7E6E;margin-top:5px;line-height:1.5;">ไปที่ "ตั้งค่า" เพิ่มพนักงาน<br>แล้วระบบจะจัดตารางให้เอง</div>'+
      '<button onclick="goSetup()" style="margin-top:16px;border:none;border-radius:13px;background:#FF7E1D;color:#1A1A2E;font-weight:700;font-size:13.5px;padding:12px 20px;cursor:pointer;">ไปตั้งค่า →</button></div>';
  }
  var daySol=sol.week[sd]||{morning:[],mid:[],night:[]};
  var dayCount=daySol.morning.length+daySol.night.length+daySol.mid.length;
  var h='';
  h+='<div style="display:flex;gap:5px;margin-top:6px;">';
  DOW.forEach(function(dw,d){ var isSel=d===sd; var isToday=d===todayIdx;
    h+='<button onclick="selDay('+d+')" style="flex:1;background:'+(isSel?'#FF7E1D':'#fff')+';border:'+(isSel?'1.5px solid #FF7E1D':(isToday?'1.5px solid #F2B45A':'1.5px solid #EFE2D2'))+';border-radius:14px;padding:7px 1px;text-align:center;cursor:pointer;">'+
      '<div style="font-size:10px;color:'+(isSel?'rgba(255,255,255,.8)':'#B0A090')+';">'+dw+'</div>'+
      '<div class="num" style="font-weight:700;font-size:13px;color:'+(isSel?'#fff':'#1A1A2E')+';margin-top:3px;">'+dates[d].getDate()+'</div></button>'; });
  h+='</div>';
  h+='<div style="background:linear-gradient(150deg,#7AD6E5,#4CC2D8);border-radius:22px;padding:13px 16px;margin-top:13px;color:#1A1A2E;box-shadow:0 16px 30px -22px rgba(26,26,46,.6);">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;">';
  h+='<span style="font-size:13px;font-weight:600;background:rgba(255,255,255,.26);padding:4px 12px;border-radius:20px;">'+DOWF[sd]+' '+dates[sd].getDate()+'</span>';
  h+='<span style="font-size:11px;font-weight:700;background:#fff;color:#2D7DA6;padding:5px 12px;border-radius:20px;">'+esc(branch.short)+'</span></div>';
  h+='<div style="display:flex;align-items:baseline;gap:8px;margin-top:8px;"><span class="num" style="font-weight:800;font-size:26px;line-height:1;">'+dayCount+'</span><span style="font-size:14px;font-weight:600;">คนเข้างาน</span></div>';
  h+='<div style="font-size:12.5px;opacity:.82;margin-top:3px;">กะเช้า '+daySol.morning.length+' คน · กะดึก '+daySol.night.length+' คน</div></div>';
  var dShort=sol.coverShort.filter(function(c){return c.d===sd;});
  if(dShort.length){ var txt='วันนี้ขาด '+dShort.map(function(c){return POSM[c.pos].label+' '+SLOTM[c.slot].label;}).join(' · ');
    h+='<div style="display:flex;align-items:center;gap:8px;background:#FBE6DE;border-radius:13px;padding:10px 13px;margin-top:12px;">'+svg(I_alert,15,'#C0392B',2)+'<span style="font-size:11.5px;color:#A2392B;font-weight:600;">'+esc(txt)+'</span></div>'; }
  var seenS={}; var daySug=sol.suggestions.filter(function(su){return su.d===sd;}).filter(function(x){ if(seenS[x.name])return false; seenS[x.name]=1; return true; });
  if(daySug.length){
    h+='<div style="background:#fff;border:1.5px solid #E7DAF5;border-radius:16px;padding:12px 14px;margin-top:11px;box-shadow:0 10px 24px -22px rgba(26,26,46,.4);">';
    h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:9px;">'+svg(I_users,15,'#6A4CC0',2)+'<span style="font-size:12px;font-weight:700;color:#6A4CC0;">ดึงคนจากสาขาอื่นมาช่วยได้</span></div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px;">';
    daySug.forEach(function(s){ h+='<div style="display:flex;align-items:center;gap:10px;"><div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13px;">'+esc(s.name)+'</div><div style="font-size:10.5px;color:#9A8C7C;">'+esc(s.from)+' · ว่างวันนี้ · ทำ '+POSM[s.pos].label+' '+SLOTM[s.slot].label+' ได้</div></div>'+
      '<button onclick="enableLoan(\''+s.empId+'\',\''+esc(s.name)+'\')" style="border:none;border-radius:11px;background:#6A4CC0;color:#fff;font-weight:700;font-size:11.5px;padding:8px 13px;cursor:pointer;white-space:nowrap;flex:0 0 auto;">ให้มาช่วย</button></div>'; });
    h+='</div></div>';
  }
  var offToday=(sol.offByDay&&sol.offByDay[sd])||[];
  if(offToday.length){ h+='<div style="display:flex;align-items:flex-start;gap:9px;background:#F4ECE0;border-radius:13px;padding:10px 13px;margin-top:11px;">'+svg(I_cal2,15,'#9A7A55',2)+'<span style="flex:1;font-size:11.5px;color:#7A6A57;line-height:1.5;"><span style="font-weight:700;">หยุดวันนี้:</span> '+esc(offToday.join(' · '))+'</span></div>'; }
  if(daySol.morning.length){
    h+=sectionHead('#F2B45A','กะเช้า','08:00–18:00 · '+daySol.morning.length+' คน');
    h+='<div style="display:flex;flex-direction:column;gap:8px;">'+daySol.morning.map(function(a){return personCard(a,'08:00–18:00');}).join('')+'</div>';
  }
  if(daySol.night.length){
    h+=sectionHead('#6A5AC0','กะดึก','17:00–03:00 · '+daySol.night.length+' คน');
    h+='<div style="display:flex;flex-direction:column;gap:8px;">'+daySol.night.map(function(a){return personCard(a,'17:00–03:00');}).join('')+'</div>';
  }
  if(!daySol.morning.length && !daySol.night.length){
    h+='<div style="text-align:center;padding:34px 16px;color:#9A8C7C;font-size:13px;">ไม่มีคนเข้ากะวันนี้</div>';
  }
  h+='<div style="text-align:center;margin-top:18px;"><button onclick="regenerate()" style="border:none;background:none;cursor:pointer;font-weight:700;font-size:12px;color:#C77A1B;text-decoration:underline;">จัดตารางใหม่</button></div><div style="height:8px;"></div>';
  return h;
}
function sectionHead(dot,label,sub){ return '<div style="display:flex;align-items:center;gap:9px;margin:14px 2px 8px;"><span style="width:9px;height:9px;border-radius:50%;background:'+dot+';flex:0 0 auto;"></span><span style="font-weight:700;font-size:14px;">'+label+'</span><span style="font-size:12px;color:#5A7488;">'+sub+'</span></div>'; }

function renderSetup(bid,branch,branchEmps,branchEmpty,sol){
  var h='';
  h+='<button onclick="regenerate()" style="width:100%;margin-top:6px;border:none;border-radius:16px;background:#FF7E1D;color:#1A1A2E;font-weight:700;font-size:15px;padding:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 16px 30px -20px rgba(255,126,29,.7);">'+svg(I_refresh,19,'#1A1A2E',2)+'จัดตารางอัตโนมัติ</button>';
  if(!branchEmpty){
    var restBad=sol.noRest.length>0, coverBad=sol.shortDays.length>0;
    h+='<div style="margin-top:13px;display:flex;flex-direction:column;gap:8px;">';
    if(!restBad) h+='<div style="display:flex;align-items:center;gap:8px;background:#DCEFE4;border-radius:13px;padding:10px 13px;">'+svg(I_check,15,'#2C7A56',2.2)+'<span style="font-size:11.5px;color:#235C40;font-weight:600;">ทุกคนได้หยุด ≥1 วัน · ไม่มีใครทำเกิน 6 วัน</span></div>';
    else h+='<div style="display:flex;align-items:center;gap:8px;background:#FBE6DE;border-radius:13px;padding:10px 13px;">'+svg(I_alert,15,'#C0392B',2)+'<span style="font-size:11.5px;color:#A2392B;font-weight:600;">'+esc(sol.noRest.join(' · '))+' — ยังไม่ได้หยุดสัปดาห์นี้</span></div>';
    if(coverBad){ var ct='คนไม่พอ '+sol.shortDays.length+' วัน — วัน'+sol.shortDays.slice().sort(function(a,b){return a-b;}).map(function(x){return DOW[x];}).join(',')+(sol.loaners.length?(' · ดึงสาขาอื่นช่วยแล้ว '+sol.loaners.length+' กะ'):'');
      h+='<div style="display:flex;align-items:center;gap:8px;background:#FFF1D6;border-radius:13px;padding:10px 13px;">'+svg(I_info,15,'#A06A12',2)+'<span style="font-size:11.5px;color:#8A5A12;font-weight:600;">'+esc(ct)+'</span></div>'; }
    h+='</div>';
  }
  var sugByEmp={}; sol.suggestions.forEach(function(su){ if(!sugByEmp[su.empId]) sugByEmp[su.empId]={empId:su.empId,name:su.name,from:su.from,slots:{},days:{}}; sugByEmp[su.empId].slots[POSM[su.pos].label]=1; sugByEmp[su.empId].days[su.d]=1; });
  var setupSug=Object.keys(sugByEmp).map(function(k){ var x=sugByEmp[k]; return {empId:x.empId,name:x.name,from:x.from,detail:'ทำ '+Object.keys(x.slots).join('/')+' ได้ · ช่วยได้ '+Object.keys(x.days).length+' วัน'}; });
  if(setupSug.length){
    h+='<div style="background:#fff;border:1.5px solid #E7DAF5;border-radius:16px;padding:13px 15px;margin-top:13px;box-shadow:0 10px 24px -22px rgba(26,26,46,.4);">';
    h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;">'+svg(I_users,16,'#6A4CC0',1.9)+'<span style="font-size:13px;font-weight:700;color:#6A4CC0;">คนสาขาอื่นที่มาช่วยได้</span></div>';
    h+='<div style="font-size:11px;color:#8A7BB5;margin-bottom:10px;line-height:1.45;">ติ๊ก "ให้มาช่วย" แล้วระบบจะจัดเข้าตารางวันที่ขาดให้อัตโนมัติ</div>';
    h+='<div style="display:flex;flex-direction:column;gap:9px;">';
    setupSug.forEach(function(s){ h+='<div style="display:flex;align-items:center;gap:10px;"><span style="width:34px;height:34px;border-radius:11px;background:#EDE8FB;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_person,18,'#6A4CC0')+'</span>'+
      '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13px;">'+esc(s.name)+'</div><div style="font-size:10.5px;color:#9A8C7C;">'+esc(s.from)+' · '+esc(s.detail)+'</div></div>'+
      '<button onclick="enableLoan(\''+s.empId+'\',\''+esc(s.name)+'\')" style="border:none;border-radius:11px;background:#6A4CC0;color:#fff;font-weight:700;font-size:11.5px;padding:8px 13px;cursor:pointer;white-space:nowrap;flex:0 0 auto;">ให้มาช่วย</button></div>'; });
    h+='</div></div>';
  }
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px;"><span style="font-weight:700;font-size:14px;color:#9A7A55;">พนักงาน · '+esc(branch.short)+'</span>'+
    '<button onclick="addEmp()" style="border:1.5px solid #EFD9CF;background:#fff;border-radius:11px;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:700;font-size:12px;color:#C77A1B;">'+svg(I_plus,14,'#C77A1B',2.4)+'เพิ่มคน</button></div>';
  if(branchEmpty){ h+='<div style="background:#fff;border:1.5px dashed #E2D3C0;border-radius:16px;padding:30px 18px;text-align:center;color:#9A8C7C;font-size:13px;">ยังไม่มีพนักงาน — กด "เพิ่มคน"</div>'; return h; }
  h+='<div style="display:flex;flex-direction:column;gap:10px;">';
  branchEmps.forEach(function(e){ var primary=(e.positions&&e.positions[0])||'cook'; var m=POSM[primary]||POSM.cook;
    var posText=(e.positions||[]).map(function(p){return POSM[p]?POSM[p].label:p;}).join(' · ')||'ยังไม่ระบุตำแหน่ง';
    var slotText=((e.preferredSlots&&e.preferredSlots.length)?e.preferredSlots:['morning','mid','late']).map(function(s){return SLOTM[SLOT_DB2ENG[s]||s].label;}).join('/');
    var offText=(e.off&&e.off.length)?e.off.slice().sort(function(a,b){return a-b;}).map(function(d){return DOW[d];}).join(','):'—';
    h+='<div onclick="editEmp(\''+e.id+'\')" style="background:#fff;border-radius:16px;padding:13px 15px;cursor:pointer;box-shadow:0 10px 24px -22px rgba(26,26,46,.5);border:1px solid #F3EADD;">'+
      '<div style="display:flex;align-items:center;gap:11px;"><span style="width:38px;height:38px;border-radius:12px;background:'+m.bg+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_person,20,m.color)+'</span>'+
      '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14.5px;">'+esc(e.name)+(e.loanOk?' <span style="font-size:9.5px;color:#6A4CC0;background:#EDE8FB;padding:1px 6px;border-radius:5px;font-weight:700;">ช่วยสาขาอื่น</span>':'')+'</div><div style="font-size:11px;color:#9A8C7C;margin-top:1px;">'+esc(posText)+'</div></div>'+
      svg(I_chev,16,'#C7BEB0',2.2)+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">'+
      '<span style="display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:#5A7488;background:#EEF4F8;padding:4px 9px;border-radius:8px;">'+svg(I_clock,11,'#5A7488',2)+esc(slotText)+'</span>'+
      '<span style="display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:#9A7A55;background:#F6EFE4;padding:4px 9px;border-radius:8px;">'+svg(I_cal,11,'#9A7A55',2)+'หยุด '+esc(offText)+'</span></div></div>'; });
  h+='</div><div style="height:8px;"></div>';
  return h;
}

function renderSheet(){
  var d=S.editEmp;
  var isEdit=!!d.id;
  var canSave=!!(d.name&&d.name.trim()&&d.positions&&d.positions.length);
  var h='<div onclick="closeSheet()" style="position:fixed;inset:0;max-width:440px;margin:0 auto;z-index:60;background:rgba(26,26,46,.45);display:flex;flex-direction:column;justify-content:flex-end;animation:fade .2s ease;">';
  h+='<div onclick="event.stopPropagation()" class="scr" style="background:#FFF6EC;border-radius:30px 30px 0 0;padding:10px 20px calc(20px + env(safe-area-inset-bottom));max-height:92%;overflow-y:auto;animation:rise .26s cubic-bezier(.2,.9,.3,1);">';
  h+='<div style="width:42px;height:5px;border-radius:3px;background:#E2D3C0;margin:6px auto 15px;"></div>';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;"><div style="font-weight:700;font-size:18px;">'+(isEdit?'แก้ไขพนักงาน':'เพิ่มพนักงาน')+'</div>'+
    (isEdit?'<button onclick="deleteEmp()" style="border:none;background:none;cursor:pointer;color:#B24A2E;font-weight:700;font-size:12.5px;padding:6px;">ลบ</button>':'')+'</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">ชื่อ</label>';
  h+='<input value="'+esc(d.name)+'" oninput="setName(this.value)" placeholder="เช่น บีม สุทธิดา" style="width:100%;border:1.5px solid #EFD9CF;background:#fff;border-radius:13px;padding:13px 14px;font-family:\'Anuphan\',sans-serif;font-size:16px;color:#1A1A2E;">';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">ตำแหน่งที่ทำได้ <span style="color:#B0A090;font-weight:600;">(อันแรก = ตำแหน่งหลัก)</span></label>';
  h+='<div style="display:flex;gap:7px;">';
  ['cook','kasst','cash'].forEach(function(k){ var on=d.positions.indexOf(k)>=0; var m=POSM[k];
    h+='<button onclick="toggleArr(\'positions\',\''+k+'\')" style="flex:1;border:1.5px solid '+(on?m.color:'#EFD9CF')+';background:'+(on?m.bg:'#fff')+';color:'+(on?m.color:'#8A7E6E')+';border-radius:13px;padding:11px 4px;cursor:pointer;font-weight:700;font-size:12.5px;">'+m.label+'</button>'; });
  h+='</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">กะที่สะดวก</label>';
  h+='<div style="display:flex;gap:7px;">';
  [['morning','morning'],['mid','mid'],['night','late']].forEach(function(pair){ var eng=pair[0], db=pair[1]; var on=d.preferredSlots.indexOf(db)>=0; var m=SLOTM[eng];
    h+='<button onclick="toggleArr(\'preferredSlots\',\''+db+'\')" style="flex:1;border:1.5px solid '+(on?'#C77A1B':'#EFD9CF')+';background:'+(on?'#FFF3E6':'#fff')+';color:'+(on?'#C2510F':'#8A7E6E')+';border-radius:13px;padding:11px 4px;cursor:pointer;font-weight:700;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:'+m.dot+';"></span>'+m.label+'</button>'; });
  h+='</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">วันหยุดประจำ</label>';
  h+='<div style="display:flex;gap:5px;">';
  DOW.forEach(function(dw,i){ var on=d.off.indexOf(i)>=0;
    h+='<button onclick="toggleArr(\'off\','+i+')" style="flex:1;min-width:0;border:1.5px solid '+(on?'#C0392B':'#EFD9CF')+';background:'+(on?'#FBE6DE':'#fff')+';color:'+(on?'#B24A2E':'#8A7E6E')+';border-radius:11px;padding:9px 0;cursor:pointer;font-weight:700;font-size:12px;">'+dw+'</button>'; });
  h+='</div>';
  h+='<label style="display:block;font-size:12px;font-weight:700;color:#7A6A57;margin:16px 2px 7px;">สาขาหลัก</label>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;">';
  S.branches.forEach(function(b){ var on=d.branchId===b.id;
    h+='<button onclick="pickDraftBranch(\''+b.id+'\')" style="border:1.5px solid '+(on?'#FF7E1D':'#EFD9CF')+';background:'+(on?'#FFF3E6':'#fff')+';color:'+(on?'#C2510F':'#8A7E6E')+';border-radius:13px;padding:10px 15px;cursor:pointer;font-weight:700;font-size:12.5px;">'+esc(b.name)+'</button>'; });
  h+='</div>';
  var lon=!!d.loanOk;
  h+='<button onclick="toggleLoan()" style="width:100%;margin-top:16px;border:1.5px solid '+(lon?'#C77A1B':'#EFD9CF')+';background:'+(lon?'#FFF3E6':'#fff')+';border-radius:14px;padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;text-align:left;">'+
    '<span style="width:34px;height:34px;border-radius:10px;background:#EDE8FB;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+svg(I_arrow,18,'#6A4CC0')+'</span>'+
    '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13.5px;color:'+(lon?'#C2510F':'#8A7E6E')+';">รับไปช่วยสาขาอื่นได้</div><div style="font-size:10.5px;color:#9A8C7C;margin-top:1px;">ระบบจะดึงไปช่วยสาขาที่คนไม่พอ (วันที่ว่าง)</div></div>'+
    '<span style="width:26px;height:26px;border-radius:8px;border:2px solid '+(lon?'#C77A1B':'#EFD9CF')+';background:'+(lon?'#FFF3E6':'#fff')+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;">'+(lon?svg(I_check,15,'#C2510F',3):'')+'</span></button>';
  h+='<button onclick="saveEmp()" style="width:100%;margin-top:20px;border:none;border-radius:16px;background:'+(canSave?'#FF7E1D':'#F0E2D2')+';color:'+(canSave?'#1A1A2E':'#C0B4A2')+';font-weight:700;font-size:15px;padding:15px;cursor:'+(canSave?'pointer':'not-allowed')+';">บันทึก</button>';
  h+='<button onclick="closeSheet()" style="width:100%;margin-top:9px;border:none;background:none;padding:8px;cursor:pointer;font-weight:600;font-size:12.5px;color:#9A8C7C;">ยกเลิก</button><div style="height:6px;"></div>';
  h+='</div></div>';
  return h;
}

load();
</script>
